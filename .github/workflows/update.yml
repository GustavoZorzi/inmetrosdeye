name: Atualizar dados Inmetro

on:
  schedule:
    - cron: '0 3 * * *'   # 00:00 BRT = 03:00 UTC
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Processar CSV do Inmetro
        run: python scripts/process.py

      - name: Commitar dados.json atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados.json
          git diff --cached --quiet || git commit -m "dados: atualização automática $(date -u '+%d/%m/%Y %H:%M') UTC"
          git push
